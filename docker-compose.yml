name: student-research

services:
  # ──────────────────────────────────────────────
  # MySQL Database
  # ──────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: student-research-db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-student_research}
      # NOTE: MYSQL_USER / MYSQL_PASSWORD intentionally omitted.
      # MySQL rejects MYSQL_USER=root (already exists).  The app
      # connects as root with DB_ROOT_PASSWORD instead.
    ports:
      - "${DB_HOST_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -u root -p$${MYSQL_ROOT_PASSWORD} --silent",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # ──────────────────────────────────────────────
  # Node.js API  (service name = "app" so you can
  # run: docker compose restart app)
  # ──────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: student-research-app
    init: true # proper PID-1 signal forwarding
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 4000
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-student_research}
      DB_USER: root
      DB_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      JWT_SECRET: ${JWT_SECRET:-changeme_dev_secret}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      API_ORIGIN: ${API_ORIGIN:-http://localhost:4000}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:3000}
    ports:
      - "${API_PORT:-4000}:4000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped
    volumes:
      - .:/app
      - /app/node_modules
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    entrypoint: ["sh", "-c", "sed -i 's/\\r//' /app/docker-entrypoint.sh && sh /app/docker-entrypoint.sh"]

networks:
  backend:
    driver: bridge

volumes:
  mysql_data:
